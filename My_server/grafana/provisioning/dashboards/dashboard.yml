# Grafana仪表盘配置

apiVersion: 1

providers:
  - name: 'tms_dashboards'
    org_id: 1
    folder: ''
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true


