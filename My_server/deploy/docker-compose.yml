version: '3.8'

# CarpTMS Docker Compose 配置
# 用于本地开发/测试环境

services:
  # ============ PostgreSQL 主从复制 ============
  postgres-primary:
    image: postgres:15-alpine
    container_name: carptms-postgres-primary
    environment:
      POSTGRES_DB: carptms_db
      POSTGRES_USER: carptms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_123}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./deploy/init/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_wal_senders=10
      -c wal_level=replica
      -c hot_standby=on
      -c max_replication_slots=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carptms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carptms-network

  postgres-replica:
    image: postgres:15-alpine
    container_name: carptms-postgres-replica
    environment:
      POSTGRES_DB: carptms_db
      POSTGRES_USER: carptms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_123}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    command: >
      postgres
      -c hot_standby=on
      -c max_connections=500
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carptms -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carptms-network

  # ============ Redis Sentinel 集群 ============
  redis-master:
    image: redis:7-alpine
    container_name: carptms-redis-master
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis-master-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carptms-network

  redis-replica-1:
    image: redis:7-alpine
    container_name: carptms-redis-replica-1
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
      --appendonly yes
      --replicaof redis-master 6379
      --masterauth ${REDIS_PASSWORD:-redis_dev_pass}
    volumes:
      - redis-replica-1-data:/data
    depends_on:
      - redis-master
    networks:
      - carptms-network

  redis-replica-2:
    image: redis:7-alpine
    container_name: carptms-redis-replica-2
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
      --appendonly yes
      --replicaof redis-master 6379
      --masterauth ${REDIS_PASSWORD:-redis_dev_pass}
    volumes:
      - redis-replica-2-data:/data
    depends_on:
      - redis-master
    networks:
      - carptms-network

  # ============ Loki 日志聚合 ============
  loki:
    image: grafana/loki:2.9.0
    container_name: carptms-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carptms-network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: carptms-promtail
    volumes:
      - ./logs:/var/log/carptms
      - ./deploy/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - carptms-network

  # ============ Prometheus 监控 ============
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: carptms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carptms-network

  # ============ Grafana 可视化 ============
  grafana:
    image: grafana/grafana:10.2.0
    container_name: carptms-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - carptms-network

  # ============ Alertmanager 告警 ============
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: carptms-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - carptms-network

# ============ 网络 ============
networks:
  carptms-network:
    driver: bridge

# ============ 卷 ============
volumes:
  postgres-primary-data:
  postgres-replica-data:
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data:
  loki-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
