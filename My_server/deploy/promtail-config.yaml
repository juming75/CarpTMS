# Promtail 配置 (日志收集)
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/log/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # CarpTMS 应用日志
  - job_name: carptms-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: carptms-app
          __path__: /var/log/carptms/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            target: target
      - labels:
          level:
          target:

  # CarpTMS 访问日志
  - job_name: carptms-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: carptms-access
          __path__: /var/log/carptms/access*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<ip>\S+) - \S+ \[(?P<timestamp>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+)" (?P<status>\d+)'
      - labels:
          method:
          path:
          status:

  # Docker 容器日志
  - job_name: carptms-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: carptms-.*
        action: keep
      - regex: '/var/log/carptms/containers/(?P<container_name>[^/]+)\.log'
        source_labels: [__meta_docker_container_log_path]
        target_label: container_name
