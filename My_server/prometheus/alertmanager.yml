# Alertmanager配置文件

# 全局配置
global:
  resolve_timeout: 5m
  # 电子邮件配置
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager'
  smtp_auth_password: 'password'
  smtp_require_tls: true
  # 微信配置
  wechat_api_url: 'https://qyapi.weixin.qq.com/cgi-bin/'
  wechat_api_corp_id: 'your_corp_id'

# 模板配置
templates:
  - 'templates/*.tmpl'

# 路由配置
route:
  group_by: ['alertname', 'cluster', 'service', 'severity']
  group_wait: 30s  # 分组等待时间
  group_interval: 5m  # 分组间隔时间
  repeat_interval: 1h  # 重复告警间隔时间
  receiver: 'email-default'  # 默认接收者
  
  # 按告警级别路由
  routes:
    # 紧急告警
    - match:
        severity: 'critical'
      receiver: 'critical-alerts'
      group_wait: 10s  # 紧急告警更快分组
      repeat_interval: 30m  # 紧急告警更频繁重复
    
    # 警告告警
    - match:
        severity: 'warning'
      receiver: 'warning-alerts'
      group_wait: 20s
      repeat_interval: 1h
    
    # 信息告警
    - match:
        severity: 'info'
      receiver: 'info-alerts'
      group_wait: 30s
      repeat_interval: 2h
    
    # 数据库相关告警
    - match_re:
        alertname: 'Database.*'
      receiver: 'database-alerts'
      group_by: ['alertname', 'instance']
    
    # Redis相关告警
    - match_re:
        alertname: 'Redis.*'
      receiver: 'redis-alerts'
      group_by: ['alertname', 'instance']
    
    # 系统相关告警
    - match_re:
        alertname: '.*Usage.*|.*Traffic.*'
      receiver: 'system-alerts'
      group_by: ['alertname', 'instance']

# 接收者配置
receivers:
  # 默认电子邮件接收者
  - name: 'email-default'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true  # 发送已解决告警
        subject: '{{ template "email.subject" . }}'
        html: '{{ template "email.html" . }}'

  # 紧急告警接收者
  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@example.com,emergency@example.com'
        send_resolved: true
        subject: '[CRITICAL] {{ template "email.subject" . }}'
        html: '{{ template "email.html" . }}'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#critical-alerts'
        send_resolved: true
        username: 'Alertmanager'
        icon_emoji: ':fire:'
        text: '{{ template "slack.text" . }}'
    wechat_configs:
      - corp_id: 'your_corp_id'
        api_url: 'https://qyapi.weixin.qq.com/cgi-bin/'
        to_party: '1'
        agent_id: '1000002'
        api_secret: 'your_api_secret'
        message: '{{ template "wechat.message" . }}'

  # 警告告警接收者
  - name: 'warning-alerts'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true
        subject: '[WARNING] {{ template "email.subject" . }}'
        html: '{{ template "email.html" . }}'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts'
        send_resolved: true
        username: 'Alertmanager'
        icon_emoji: ':warning:'
        text: '{{ template "slack.text" . }}'

  # 信息告警接收者
  - name: 'info-alerts'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: false  # 信息告警不发送已解决通知
        subject: '[INFO] {{ template "email.subject" . }}'
        html: '{{ template "email.html" . }}'

  # 数据库告警接收者
  - name: 'database-alerts'
    email_configs:
      - to: 'db-admin@example.com,admin@example.com'
        send_resolved: true
        subject: '[DATABASE] {{ template "email.subject" . }}'
        html: '{{ template "email.html" . }}'

  # Redis告警接收者
  - name: 'redis-alerts'
    email_configs:
      - to: 'redis-admin@example.com,admin@example.com'
        send_resolved: true
        subject: '[REDIS] {{ template "email.subject" . }}'
        html: '{{ template "email.html" . }}'

  # 系统告警接收者
  - name: 'system-alerts'
    email_configs:
      - to: 'sys-admin@example.com,admin@example.com'
        send_resolved: true
        subject: '[SYSTEM] {{ template "email.subject" . }}'
        html: '{{ template "email.html" . }}'

  # Webhook接收者（用于集成其他系统）
  - name: 'webhook-default'
    webhook_configs:
      - url: 'http://your-webhook-server:8080/webhook'
        send_resolved: true
        http_config:
          basic_auth:
            username: 'webhook-user'
            password: 'webhook-password'

# 抑制规则
inhibit_rules:
  # 当有紧急告警时，抑制同组的警告告警
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service', 'instance']
  
  # 当有警告告警时，抑制同组的信息告警
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'cluster', 'service', 'instance']
  
  # 当服务实例不健康时，抑制该实例的其他告警
  - source_match:
      alertname: 'ServiceInstanceUnhealthy'
    target_match_re:
      alertname: '.*'
    equal: ['instance', 'service']
  
  # 当所有服务实例均不健康时，抑制所有相关告警
  - source_match:
      alertname: 'AllServiceInstancesUnhealthy'
    target_match_re:
      alertname: '.*'
    equal: ['service']

# 告警静默配置
# 可以通过Alertmanager UI或API创建静默规则
# 例如：静默所有测试环境的告警
# silence:
#   - matchers:
#       - name: environment
#         value: test
#     startsAt: 2026-02-16T00:00:00Z
#     endsAt: 2026-02-17T00:00:00Z
#     createdBy: 'admin'
#     comment: '测试环境维护，静默告警'


