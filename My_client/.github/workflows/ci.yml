name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: My_client/package-lock.json

      - name: Install dependencies
        working-directory: My_client
        run: npm ci

      - name: Run ESLint
        working-directory: My_client
        run: npm run lint

      - name: Check formatting
        working-directory: My_client
        run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: My_client/package-lock.json

      - name: Install dependencies
        working-directory: My_client
        run: npm ci

      - name: Run unit tests
        working-directory: My_client
        run: npm run test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: My_client/coverage
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: My_client/package-lock.json

      - name: Install dependencies
        working-directory: My_client
        run: npm ci

      - name: Build
        working-directory: My_client
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: My_client/dist/

  rust-check:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            My_server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('My_server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run clippy
        working-directory: My_server
        run: cargo clippy -- -D warnings
